services:
  postgres:
    image: postgres:15-alpine
    container_name: trackroute-db
    environment:
      POSTGRES_USER: trackroute
      POSTGRES_PASSWORD: trackroute_pass
      POSTGRES_DB: trackroute_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackroute -d trackroute_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: trackroute-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trackroute.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
